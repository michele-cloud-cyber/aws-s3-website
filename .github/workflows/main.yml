name: Deploy to S3 with OIDC

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::502759713641:role/github-oidc-role
          aws-region: eu-south-1

      - name: Deploy to S3
        run: aws s3 sync . s3://michele-aws-static-site-2026 --delete
